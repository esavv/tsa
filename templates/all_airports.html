{% extends "base.html" %}
{% block title %}All airports – TSA Times{% endblock %}
{% block head %}
  <style>
    main.home-layout {
      width: 100%;
    }
    .home-cluster {
      width: fit-content;
      max-width: 100%;
      min-width: 0;
      margin-left: auto;
      margin-right: auto;
      --home-terminal-pad-extra-x: 3rem;
      --home-spark-gap-before: 1rem;
      --home-spark-pad-before: 0.5rem;
      --home-spark-pad-after: 1rem;
    }
    #airports > .airport-section th:first-child,
    #airports > .airport-section td:first-child {
      padding-left: 0.75rem;
      padding-right: calc(0.75rem + var(--home-terminal-pad-extra-x));
      white-space: nowrap;
    }
    #airports {
      display: flex;
      flex-direction: column;
    }
    #airports > .airport-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .home-table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      max-width: 100%;
    }
    #airports > .airport-section table {
      width: max-content;
      max-width: none;
    }
    #airports > .airport-section th:not(:first-child),
    #airports > .airport-section td:not(:first-child) {
      white-space: nowrap;
      padding-right: 0.45rem;
    }
    .metric-wrap {
      display: inline-flex;
      align-items: center;
      gap: var(--home-spark-gap-before);
      width: fit-content;
    }
    .metric-value {
      white-space: nowrap;
    }
    .spark-slot {
      display: inline-flex;
      width: auto;
      align-items: center;
      flex: 0 0 auto;
      padding-left: var(--home-spark-pad-before);
      padding-right: var(--home-spark-pad-after);
    }
    .sparkline {
      width: 72px;
      height: 26px;
      display: block;
    }
    .home-cluster > h1 {
      margin-bottom: 0.5rem;
      line-height: 1.15;
    }
    .home-subhead {
      margin-top: 0;
      margin-bottom: 0;
    }
    #scraped-at {
      font-size: 0.78rem;
      line-height: 1.35;
    }
    /* Match airport detail page heading (code + display name). */
    .airport-page-heading {
      margin: 0 0 0.5rem;
      font-size: inherit;
      font-weight: 600;
      line-height: 1.2;
    }
    .airport-page-heading__top {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .airport-page-heading__code {
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      color: #0f172a;
      flex-shrink: 0;
    }
    .airport-page-heading__name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
      line-height: 1.3;
    }
    .airport-search-wrap {
      margin: 0.75rem 0 1rem;
    }
    .airport-search-field {
      position: relative;
      max-width: min(30rem, 100%);
    }
    .airport-search__icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.125rem;
      height: 1.125rem;
      color: #64748b;
      pointer-events: none;
    }
    .airport-search__icon svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .airport-search {
      width: 100%;
      max-width: 100%;
      padding: 0.45rem 0.65rem 0.45rem 2.45rem;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 9999px;
      background: #f9fafb;
      color: #0f172a;
    }
    .airport-search::placeholder {
      color: #64748b;
    }
    .airport-search-panel {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      z-index: 40;
      background: #fff;
      border: 1px solid #d0d7e2;
      border-radius: 10px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      max-height: min(340px, 55vh);
      overflow-y: auto;
    }
    .airport-search-results {
      padding: 0.25rem 0;
    }
    .airport-search-row {
      padding: 0.55rem 0.75rem 0.6rem;
      cursor: pointer;
      border-bottom: 1px solid #eef2f7;
    }
    .airport-search-row:last-child {
      border-bottom: none;
    }
    .airport-search-row:hover,
    .airport-search-row.is-active {
      background: #f1f5f9;
    }
    .airport-search-row__top {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .airport-search-code {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      color: #0f172a;
      flex-shrink: 0;
    }
    .airport-search-name {
      font-size: 0.9rem;
      color: #1e293b;
      line-height: 1.3;
    }
    .airport-search-row__meta {
      font-size: 0.78rem;
      margin-top: 0.2rem;
      line-height: 1.35;
    }
    .airport-search-row__main {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 0.55rem 1rem;
      width: 100%;
    }
    .airport-search-row__left {
      flex: 1 1 12rem;
      min-width: 0;
    }
    .airport-search-row__chips {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 0.15rem;
      flex: 0 1 auto;
      margin-left: auto;
      max-width: 100%;
      min-width: 0;
    }
    .airport-search-row__chip-run {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: stretch;
      justify-content: flex-end;
      flex: 0 1 auto;
      min-width: 0;
    }
    .airport-search-more-slot {
      box-sizing: border-box;
      flex: 0 0 1.75rem;
      width: 1.75rem;
      min-width: 1.75rem;
      max-width: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      align-self: stretch;
    }
    .airport-search-row__chips--empty {
      align-items: center;
      flex-wrap: nowrap;
      width: 100%;
      max-width: 100%;
    }
    .airport-search-row__chips-msg {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 0.78rem;
      font-weight: 400;
      text-align: left;
    }
    .airport-search-chip {
      box-sizing: border-box;
      width: 10rem;
      min-width: 10rem;
      max-width: 10rem;
      flex-shrink: 0;
      border: 1px solid #d0d7e2;
      border-radius: 10px;
      background: #fff;
      padding: 0.28rem 0.48rem 0.32rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      align-items: flex-start;
      pointer-events: none;
    }
    .airport-search-chip__label {
      box-sizing: border-box;
      width: 100%;
      min-width: 0;
      font-size: 0.68rem;
      font-weight: 600;
      color: #334155;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .airport-search-chip__waits {
      display: block;
      width: 100%;
      min-width: 0;
      font-size: 0.65rem;
      line-height: 1.25;
      font-weight: 400;
      color: #64748b;
    }
    .airport-search-chip__wait-line {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .airport-search-chip__wait--empty {
      color: #94a3b8;
    }
    .airport-search-chip-more {
      box-sizing: border-box;
      display: block;
      width: 100%;
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      white-space: nowrap;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      text-align: right;
      line-height: 1.2;
      pointer-events: none;
    }
  </style>
{% endblock %}
{% block body %}
  <main class="home-layout">
    <div class="home-cluster">
      <h1>TSA Wait Times</h1>
      <p class="muted home-subhead">All airports (latest scrape)</p>
      <div class="airport-search-wrap">
        <div class="airport-search-field">
          <span class="airport-search__icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="11" cy="11" r="7"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
          </span>
          <input
            type="search"
            class="airport-search"
            id="home-airport-search"
            disabled
            placeholder="Search airports"
            aria-label="Search airports"
          />
          <div id="home-airport-search-panel" class="airport-search-panel" hidden>
            <div id="home-airport-search-results" class="airport-search-results"></div>
          </div>
        </div>
      </div>
      <div id="loading">Loading…</div>
      <div id="content" style="display: none;">
        <p class="muted" id="scraped-at"></p>
        <div class="airport-section" id="airports"></div>
      </div>
    </div>
  </main>
  <script src="{{ url_for('static', filename='terminal_tab_labels.js') }}"></script>
  <script>
    const QUEUE_TYPE_ORDER = [
      'general', 'precheck', 'priority', 'clear',
    ];
    const SPARKLINE_COLORS = [
      '#2563eb', '#16a34a', '#ca8a04', '#9333ea', '#dc2626', '#0891b2', '#4f46e5',
    ];

    function sortQueueTypes(types) {
      const set = new Set(types);
      const out = [];
      for (const q of QUEUE_TYPE_ORDER) {
        if (set.has(q)) out.push(q);
      }
      const rest = [...set].filter(q => !QUEUE_TYPE_ORDER.includes(q)).sort();
      return out.concat(rest);
    }

    function queueTypeLabel(qt) {
      const labels = {
        general: 'General',
        precheck: 'PreCheck',
        priority: 'Priority',
        clear: 'Clear',
      };
      if (labels[qt]) return labels[qt];
      return String(qt).replace(/_/g, ' ').replace(/\b\w/g, function (c) {
        return c.toUpperCase();
      });
    }

    function airportCatalogEntry(catalogAirports, code) {
      for (const a of catalogAirports) {
        if (a.code === code) {
          const tab = { ...(a.terminal_tab || {}) };
          delete tab.preset;
          return { ...a, code: a.code, terminal_tab: tab };
        }
      }
      return { code, terminal_tab: {} };
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function sectionHeadingHtml(code, displayName) {
      const name = displayName && String(displayName).trim();
      const top =
        '<span class="airport-page-heading__top">' +
        '<span class="airport-page-heading__code">' +
        escHtml(code) +
        '</span>' +
        (name
          ? '<span class="airport-page-heading__name">' + escHtml(name) + '</span>'
          : '') +
        '</span>';
      return '<h2 class="airport-page-heading">' + top + '</h2>';
    }

    function terminalHref(airportEntry, terminal, gateRaw) {
      const g = effectiveGateForTab(airportEntry, gateRaw || '');
      let u = '/' + encodeURIComponent(airportEntry.code) + '?terminal=' + encodeURIComponent(terminal || '');
      if (g) u += '&gate=' + encodeURIComponent(g);
      return u;
    }

    function queueTypesWithData(rows) {
      const found = new Set();
      for (const row of rows) {
        const qmap = row.queues || {};
        for (const qt of Object.keys(qmap)) {
          const slot = qmap[qt] || {};
          const mins = slot.minutes;
          const spark = slot.spark || [];
          if (mins != null || spark.length > 0) found.add(qt);
        }
      }
      return sortQueueTypes([...found]);
    }

    function drawSparkline(canvas, points, color) {
      if (!canvas || !points || points.length < 2) return;
      const w = 72;
      const h = 26;
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);

      const values = points.map(p => p.minutes).filter(v => v != null);
      if (values.length < 2) return;
      const minV = Math.min(...values);
      const maxV = Math.max(...values);
      const range = maxV - minV;
      const pad = 2;
      const isFlat = range === 0;

      ctx.beginPath();
      points.forEach((p, i) => {
        const x = pad + (i * (w - pad * 2)) / (points.length - 1);
        const y = isFlat
          ? h / 2
          : h - pad - ((p.minutes - minV) / range) * (h - pad * 2);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    Promise.all([fetch('/api/catalog').then(r => r.json()), fetch('/api/latest').then(r => r.json())])
      .then(([catalog, data]) => {
        const catalogAirports = catalog.airports || [];
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        if (data.scraped_at_utc) {
          const d = new Date(data.scraped_at_utc);
          document.getElementById('scraped-at').textContent =
            'Last updated: ' + d.toLocaleString([], {
              year: 'numeric',
              month: 'numeric',
              day: 'numeric',
              hour: 'numeric',
              minute: '2-digit'
            });
        }
        const airportOrder = [
          'JFK', 'LGA', 'EWR', 'LAX', 'MIA', 'SEA', 'DCA', 'ATL', 'DFW', 'DEN', 'CLT', 'LAS', 'MCO', 'PHX',
        ];
        const byCode = data.airports || {};
        const seen = new Set();
        const codes = [];
        for (const code of airportOrder) {
          if (byCode[code]) {
            codes.push(code);
            seen.add(code);
          }
        }
        for (const code of Object.keys(byCode).sort()) {
          if (!seen.has(code)) codes.push(code);
        }
        const container = document.getElementById('airports');
        for (const code of codes) {
          const terminals = byCode[code];
          if (!terminals) continue;
          const catalogEntry = airportCatalogEntry(catalogAirports, code);
          const section = document.createElement('div');
          section.className = 'airport-section';
          section.innerHTML = sectionHeadingHtml(code, catalogEntry.display_name);
          const queueCols = queueTypesWithData(terminals);
          const theadRow = document.createElement('tr');
          const thTerminal = document.createElement('th');
          thTerminal.textContent = 'Terminal';
          theadRow.appendChild(thTerminal);
          for (const qt of queueCols) {
            const th = document.createElement('th');
            th.textContent = queueTypeLabel(qt);
            theadRow.appendChild(th);
          }
          const thead = document.createElement('thead');
          thead.appendChild(theadRow);
          const tbody = document.createElement('tbody');
          const table = document.createElement('table');
          table.appendChild(thead);
          table.appendChild(tbody);
          for (const row of terminals) {
            const tr = document.createElement('tr');
            const gate = effectiveGateForTab(catalogEntry, row.gate || '');
            const linkLabel = terminalTabLabel(catalogEntry, row.terminal, row.gate || '');
            const gateSlug = gate ? String(gate).replace(/[^a-zA-Z0-9]+/g, '_') : 'all';
            const href = terminalHref(catalogEntry, row.terminal, row.gate || '');
            const qmap = row.queues || {};
            let tds =
              '<td><a class="terminal-link" href="' +
              href +
              '">' +
              linkLabel +
              '</a></td>';
            for (let ci = 0; ci < queueCols.length; ci++) {
              const qt = queueCols[ci];
              const slot = qmap[qt] || {};
              const mins = slot.minutes;
              const spark = slot.spark || [];
              const valText = mins != null ? mins + ' min' : '–';
              const canvasId =
                'spark-' + code + '-' + row.terminal + '-' + gateSlug + '-' + qt.replace(/[^a-zA-Z0-9]+/g, '_');
              tds +=
                '<td><span class="metric-wrap"><span class="metric-value">' + valText +
                '</span><span class="spark-slot"><canvas class="sparkline" id="' + canvasId +
                '"></canvas></span></span></td>';
            }
            tr.innerHTML = tds;
            tbody.appendChild(tr);
            const rowCanvases = tr.querySelectorAll('canvas.sparkline');
            for (let ci = 0; ci < queueCols.length; ci++) {
              const qt = queueCols[ci];
              const slot = qmap[qt] || {};
              const spark = slot.spark || [];
              drawSparkline(rowCanvases[ci], spark, SPARKLINE_COLORS[ci % SPARKLINE_COLORS.length]);
            }
          }
          const scrollWrap = document.createElement('div');
          scrollWrap.className = 'home-table-scroll';
          scrollWrap.appendChild(table);
          section.appendChild(scrollWrap);
          container.appendChild(section);
        }
      })
      .catch(e => {
        document.getElementById('loading').textContent = 'Error: ' + e.message;
      });
  </script>
  <script src="{{ url_for('static', filename='queue_wait_line.js') }}"></script>
  <script src="{{ url_for('static', filename='airport_search.js') }}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof initTsaAirportSearch !== 'function') return;
      var inp = document.getElementById('home-airport-search');
      var panel = document.getElementById('home-airport-search-panel');
      var list = document.getElementById('home-airport-search-results');
      if (!inp || !panel || !list) return;
      initTsaAirportSearch({
        input: inp,
        panel: panel,
        list: list,
      });
    });
  </script>
{% endblock %}
