{% extends "base.html" %}
{% block title %}TSA Wait Times – JFK, LGA & EWR{% endblock %}
{% block head %}
  <style>
    /* One shrink-wrapped column: title + tables share the same left edge;
       the whole column is centered in the body (max-width 900px). */
    main.home-layout {
      width: 100%;
    }
    .home-cluster {
      width: fit-content;
      max-width: 100%;
      min-width: 0; /* lets nested max-width % / overflow resolve on small screens */
      margin-left: auto;
      margin-right: auto;
      /* --- Home table spacing (toggle these) ---
         Base table cell padding is in base.html: 0.4rem top/bottom, 0.75rem left/right. */
      --home-terminal-pad-extra-x: 3rem; /* added to RIGHT of Terminal column only (after the link text) */
      --home-spark-gap-before: 1rem;     /* space between "N min" text and the spark strip */
      --home-spark-pad-before: 0.5rem;     /* padding inside spark cell, LEFT of the canvas */
      --home-spark-pad-after: 1rem;      /* padding inside spark cell, RIGHT of the canvas */
    }
    #airports > .airport-section th:first-child,
    #airports > .airport-section td:first-child {
      padding-left: 0.75rem; /* base horizontal; no extra before terminal name */
      padding-right: calc(0.75rem + var(--home-terminal-pad-extra-x));
      white-space: nowrap; /* keep “Terminal 1” on one line with padding after the link */
    }
    #airports {
      display: flex;
      flex-direction: column;
    }
    #airports > .airport-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .home-table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      max-width: 100%;
    }
    #airports > .airport-section table {
      width: max-content;
      max-width: none; /* don’t squeeze columns; narrow viewports scroll instead */
    }
    #airports > .airport-section th:nth-child(2),
    #airports > .airport-section th:nth-child(3),
    #airports > .airport-section td:nth-child(2),
    #airports > .airport-section td:nth-child(3) {
      white-space: nowrap;
      padding-right: 0.45rem;
    }
    .metric-wrap {
      display: inline-flex;
      align-items: center;
      gap: var(--home-spark-gap-before);
      width: fit-content;
    }
    .metric-value {
      white-space: nowrap;
    }
    .spark-slot {
      display: inline-flex;
      width: auto;
      align-items: center;
      flex: 0 0 auto;
      padding-left: var(--home-spark-pad-before);
      padding-right: var(--home-spark-pad-after);
    }
    .sparkline {
      width: 72px;
      height: 26px;
      display: block;
    }
    .home-cluster > h1 {
      margin-bottom: 1rem;
      line-height: 1.15;
    }
    .home-subhead {
      margin-top: 0;
      margin-bottom: 0;
    }
  </style>
{% endblock %}
{% block body %}
  <main class="home-layout">
    <div class="home-cluster">
      <h1>TSA Wait Times</h1>
      <p class="muted home-subhead">Security line wait times at JFK, LGA, and EWR</p>
      <div id="loading">Loading…</div>
      <div id="content" style="display: none;">
        <p class="muted" id="scraped-at"></p>
        <div class="airport-section" id="airports"></div>
      </div>
    </div>
  </main>
  <script>
    function drawSparkline(canvas, points, color) {
      if (!canvas || !points || points.length < 2) return;
      const w = 72;
      const h = 26;
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);

      const values = points.map(p => p.minutes).filter(v => v != null);
      if (values.length < 2) return;
      const minV = Math.min(...values);
      const maxV = Math.max(...values);
      const range = maxV - minV;
      const pad = 2;
      const isFlat = range === 0;

      ctx.beginPath();
      points.forEach((p, i) => {
        const x = pad + (i * (w - pad * 2)) / (points.length - 1);
        const y = isFlat
          ? h / 2
          : h - pad - ((p.minutes - minV) / range) * (h - pad * 2);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    fetch('/api/latest')
      .then(r => r.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        if (data.scraped_at_utc) {
          const d = new Date(data.scraped_at_utc);
          document.getElementById('scraped-at').textContent =
            'Last updated: ' + d.toLocaleString([], {
              year: 'numeric',
              month: 'numeric',
              day: 'numeric',
              hour: 'numeric',
              minute: '2-digit'
            });
        }
        const names = { LGA: 'LaGuardia (LGA)', JFK: 'JFK', EWR: 'Newark (EWR)' };
        const order = ['JFK', 'LGA', 'EWR'];
        const container = document.getElementById('airports');
        for (const code of order) {
          const terminals = (data.airports || {})[code];
          if (!terminals) continue;
          const section = document.createElement('div');
          section.className = 'airport-section';
          section.innerHTML = '<h2>' + (names[code] || code) + '</h2>';
          const table = document.createElement('table');
          table.innerHTML = '<thead><tr><th>Terminal</th><th>General</th><th>PreCheck</th></tr></thead><tbody></tbody>';
          const tbody = table.querySelector('tbody');
          for (const row of terminals) {
            const tr = document.createElement('tr');
            const general = row.general != null ? row.general + ' min' : '–';
            const precheck = row.precheck != null ? row.precheck + ' min' : '–';
            const gate = row.gate || '';
            const termLabel = gate ? (row.terminal + ': Gates ' + gate) : row.terminal;
            const gateSlug = gate ? String(gate).replace(/[^a-zA-Z0-9]+/g, '_') : 'all';
            const gateQs = gate ? ('?gate=' + encodeURIComponent(gate)) : '';
            const gCanvasId = 'spark-g-' + code + '-' + row.terminal + '-' + gateSlug;
            const pCanvasId = 'spark-p-' + code + '-' + row.terminal + '-' + gateSlug;
            tr.innerHTML =
              '<td><a class="terminal-link" href="/terminal/' + code + '/' + encodeURIComponent(row.terminal) + gateQs + '">Terminal ' + termLabel + '</a></td>' +
              '<td><span class="metric-wrap"><span class="metric-value">' + general + '</span><span class="spark-slot"><canvas class="sparkline" id="' + gCanvasId + '"></canvas></span></span></td>' +
              '<td><span class="metric-wrap"><span class="metric-value">' + precheck + '</span><span class="spark-slot"><canvas class="sparkline" id="' + pCanvasId + '"></canvas></span></span></td>';
            tbody.appendChild(tr);

            // Draw tiny 6-hour trend lines.
            const rowCanvases = tr.querySelectorAll('canvas.sparkline');
            drawSparkline(rowCanvases[0], row.spark_general || [], '#2563eb');
            drawSparkline(rowCanvases[1], row.spark_precheck || [], '#16a34a');
          }
          const scrollWrap = document.createElement('div');
          scrollWrap.className = 'home-table-scroll';
          scrollWrap.appendChild(table);
          section.appendChild(scrollWrap);
          container.appendChild(section);
        }
      })
      .catch(e => {
        document.getElementById('loading').textContent = 'Error: ' + e.message;
      });
  </script>
{% endblock %}
