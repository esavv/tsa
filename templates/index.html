{% extends "base.html" %}
{% block title %}TSA Times - Major US Airports{% endblock %}
{% block head %}
  <style>
    /* One shrink-wrapped column: title + tables share the same left edge;
       the whole column is centered in the body (max-width 900px). */
    main.home-layout {
      width: 100%;
    }
    .home-cluster {
      width: fit-content;
      max-width: 100%;
      min-width: 0; /* lets nested max-width % / overflow resolve on small screens */
      margin-left: auto;
      margin-right: auto;
      /* --- Home table spacing (toggle these) ---
         Base table cell padding is in base.html: 0.4rem top/bottom, 0.75rem left/right. */
      --home-terminal-pad-extra-x: 3rem; /* added to RIGHT of Terminal column only (after the link text) */
      --home-spark-gap-before: 1rem;     /* space between "N min" text and the spark strip */
      --home-spark-pad-before: 0.5rem;     /* padding inside spark cell, LEFT of the canvas */
      --home-spark-pad-after: 1rem;      /* padding inside spark cell, RIGHT of the canvas */
    }
    #airports > .airport-section th:first-child,
    #airports > .airport-section td:first-child {
      padding-left: 0.75rem; /* base horizontal; no extra before terminal name */
      padding-right: calc(0.75rem + var(--home-terminal-pad-extra-x));
      white-space: nowrap; /* keep “Terminal 1” on one line with padding after the link */
    }
    #airports {
      display: flex;
      flex-direction: column;
    }
    #airports > .airport-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .home-table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      max-width: 100%;
    }
    #airports > .airport-section table {
      width: max-content;
      max-width: none; /* don’t squeeze columns; narrow viewports scroll instead */
    }
    #airports > .airport-section th:not(:first-child),
    #airports > .airport-section td:not(:first-child) {
      white-space: nowrap;
      padding-right: 0.45rem;
    }
    .metric-wrap {
      display: inline-flex;
      align-items: center;
      gap: var(--home-spark-gap-before);
      width: fit-content;
    }
    .metric-value {
      white-space: nowrap;
    }
    .spark-slot {
      display: inline-flex;
      width: auto;
      align-items: center;
      flex: 0 0 auto;
      padding-left: var(--home-spark-pad-before);
      padding-right: var(--home-spark-pad-after);
    }
    .sparkline {
      width: 72px;
      height: 26px;
      display: block;
    }
    .home-cluster > h1 {
      margin-bottom: 1rem;
      line-height: 1.15;
    }
    .home-subhead {
      margin-top: 0;
      margin-bottom: 0;
    }
  </style>
{% endblock %}
{% block body %}
  <main class="home-layout">
    <div class="home-cluster">
      <h1>TSA Wait Times</h1>
      <p class="muted home-subhead">Security line wait times at major US airports</p>
      <div id="loading">Loading…</div>
      <div id="content" style="display: none;">
        <p class="muted" id="scraped-at"></p>
        <div class="airport-section" id="airports"></div>
      </div>
    </div>
  </main>
  <script>
    const QUEUE_TYPE_ORDER = [
      'general', 'precheck', 'priority', 'clear',
    ];
    const SPARKLINE_COLORS = [
      '#2563eb', '#16a34a', '#ca8a04', '#9333ea', '#dc2626', '#0891b2', '#4f46e5',
    ];

    function sortQueueTypes(types) {
      const set = new Set(types);
      const out = [];
      for (const q of QUEUE_TYPE_ORDER) {
        if (set.has(q)) out.push(q);
      }
      const rest = [...set].filter(q => !QUEUE_TYPE_ORDER.includes(q)).sort();
      return out.concat(rest);
    }

    function queueTypeLabel(qt) {
      const labels = {
        general: 'General',
        precheck: 'PreCheck',
        priority: 'Priority',
        clear: 'CLEAR',
      };
      if (labels[qt]) return labels[qt];
      return String(qt).replace(/_/g, ' ').replace(/\b\w/g, function (c) {
        return c.toUpperCase();
      });
    }

    function titleCaseWords(s) {
      return String(s)
        .split(/\s+/)
        .map(function (word) {
          if (!word) return word;
          return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        })
        .join(' ');
    }

    /** Display + URL gate: CLT ignores gate (nonsensical id until scrape fix propagates). */
    function effectiveGate(code, gate) {
      if (code === 'CLT') return '';
      return gate || '';
    }

    /** Plain-text label inside the terminal link (no HTML). */
    function homeTerminalLinkLabel(code, terminal, gateRaw) {
      const t = terminal || '';
      const g = effectiveGate(code, gateRaw);
      if (code === 'CLT') {
        return t;
      }
      if (code === 'ATL') {
        if (!g) return t;
        return t + ': ' + titleCaseWords(g);
      }
      if (code === 'MIA') {
        if (!g) return 'Checkpoint ' + t;
        return 'Checkpoint ' + t + ': Gates ' + g;
      }
      if (!g) {
        return 'Terminal ' + t;
      }
      if (code === 'DFW') {
        return 'Terminal ' + t + ': Gate ' + g;
      }
      if (code === 'LAS' || code === 'PHX') {
        return 'Terminal ' + t + ': ' + g;
      }
      if (code === 'EWR' || code === 'MCO') {
        return 'Terminal ' + t + ': Gates ' + g;
      }
      return 'Terminal ' + t + ': Gates ' + g;
    }

    function queueTypesWithData(rows) {
      const found = new Set();
      for (const row of rows) {
        const qmap = row.queues || {};
        for (const qt of Object.keys(qmap)) {
          const slot = qmap[qt] || {};
          const mins = slot.minutes;
          const spark = slot.spark || [];
          if (mins != null || spark.length > 0) found.add(qt);
        }
      }
      return sortQueueTypes([...found]);
    }

    function drawSparkline(canvas, points, color) {
      if (!canvas || !points || points.length < 2) return;
      const w = 72;
      const h = 26;
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);

      const values = points.map(p => p.minutes).filter(v => v != null);
      if (values.length < 2) return;
      const minV = Math.min(...values);
      const maxV = Math.max(...values);
      const range = maxV - minV;
      const pad = 2;
      const isFlat = range === 0;

      ctx.beginPath();
      points.forEach((p, i) => {
        const x = pad + (i * (w - pad * 2)) / (points.length - 1);
        const y = isFlat
          ? h / 2
          : h - pad - ((p.minutes - minV) / range) * (h - pad * 2);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    fetch('/api/latest')
      .then(r => r.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        if (data.scraped_at_utc) {
          const d = new Date(data.scraped_at_utc);
          document.getElementById('scraped-at').textContent =
            'Last updated: ' + d.toLocaleString([], {
              year: 'numeric',
              month: 'numeric',
              day: 'numeric',
              hour: 'numeric',
              minute: '2-digit'
            });
        }
        /* Display order mirrors scripts/scraper.py SCRAPE_AIRPORTS (NYC first). */
        const airportNames = {
          JFK: 'JFK',
          LGA: 'LaGuardia (LGA)',
          EWR: 'Newark (EWR)',
          LAX: 'Los Angeles (LAX)',
          MIA: 'Miami (MIA)',
          SEA: 'Seattle-Tacoma (SEA)',
          DCA: 'Reagan National (DCA)',
          ATL: 'Hartsfield-Jackson Atlanta (ATL)',
          DFW: 'Dallas/Fort Worth (DFW)',
          DEN: 'Denver (DEN)',
          CLT: 'Charlotte Douglas (CLT)',
          LAS: 'Harry Reid Las Vegas (LAS)',
          MCO: 'Orlando (MCO)',
          PHX: 'Phoenix Sky Harbor (PHX)',
        };
        const airportOrder = [
          'JFK', 'LGA', 'EWR', 'LAX', 'MIA', 'SEA', 'DCA', 'ATL', 'DFW', 'DEN', 'CLT', 'LAS', 'MCO', 'PHX',
        ];
        const byCode = data.airports || {};
        const seen = new Set();
        const codes = [];
        for (const code of airportOrder) {
          if (byCode[code]) {
            codes.push(code);
            seen.add(code);
          }
        }
        for (const code of Object.keys(byCode).sort()) {
          if (!seen.has(code)) codes.push(code);
        }
        const container = document.getElementById('airports');
        for (const code of codes) {
          const terminals = byCode[code];
          if (!terminals) continue;
          const section = document.createElement('div');
          section.className = 'airport-section';
          section.innerHTML = '<h2>' + (airportNames[code] || code) + '</h2>';
          const queueCols = queueTypesWithData(terminals);
          const theadRow = document.createElement('tr');
          const thTerminal = document.createElement('th');
          thTerminal.textContent = 'Terminal';
          theadRow.appendChild(thTerminal);
          for (const qt of queueCols) {
            const th = document.createElement('th');
            th.textContent = queueTypeLabel(qt);
            theadRow.appendChild(th);
          }
          const thead = document.createElement('thead');
          thead.appendChild(theadRow);
          const tbody = document.createElement('tbody');
          const table = document.createElement('table');
          table.appendChild(thead);
          table.appendChild(tbody);
          for (const row of terminals) {
            const tr = document.createElement('tr');
            const gate = effectiveGate(code, row.gate || '');
            const linkLabel = homeTerminalLinkLabel(code, row.terminal, row.gate || '');
            const gateSlug = gate ? String(gate).replace(/[^a-zA-Z0-9]+/g, '_') : 'all';
            const gateQs = gate ? ('?gate=' + encodeURIComponent(gate)) : '';
            const qmap = row.queues || {};
            let tds =
              '<td><a class="terminal-link" href="/terminal/' +
              code +
              '/' +
              encodeURIComponent(row.terminal) +
              gateQs +
              '">' +
              linkLabel +
              '</a></td>';
            for (let ci = 0; ci < queueCols.length; ci++) {
              const qt = queueCols[ci];
              const slot = qmap[qt] || {};
              const mins = slot.minutes;
              const spark = slot.spark || [];
              const valText = mins != null ? mins + ' min' : '–';
              const canvasId =
                'spark-' + code + '-' + row.terminal + '-' + gateSlug + '-' + qt.replace(/[^a-zA-Z0-9]+/g, '_');
              tds +=
                '<td><span class="metric-wrap"><span class="metric-value">' + valText +
                '</span><span class="spark-slot"><canvas class="sparkline" id="' + canvasId +
                '"></canvas></span></span></td>';
            }
            tr.innerHTML = tds;
            tbody.appendChild(tr);
            const rowCanvases = tr.querySelectorAll('canvas.sparkline');
            for (let ci = 0; ci < queueCols.length; ci++) {
              const qt = queueCols[ci];
              const slot = qmap[qt] || {};
              const spark = slot.spark || [];
              drawSparkline(rowCanvases[ci], spark, SPARKLINE_COLORS[ci % SPARKLINE_COLORS.length]);
            }
          }
          const scrollWrap = document.createElement('div');
          scrollWrap.className = 'home-table-scroll';
          scrollWrap.appendChild(table);
          section.appendChild(scrollWrap);
          container.appendChild(section);
        }
      })
      .catch(e => {
        document.getElementById('loading').textContent = 'Error: ' + e.message;
      });
  </script>
{% endblock %}
