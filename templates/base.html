<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TSA Wait Times{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon-32x32.png') }}" sizes="32x32" type="image/png">
  <link rel="icon" href="{{ url_for('static', filename='favicon-192x192.png') }}" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 980px; margin: 0 auto; padding: 1rem; }
    h1 { margin-top: 0; }
    a { color: #0066cc; }
    a:hover { text-decoration: underline; }
    table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; }
    th, td { border: 1px solid #ccc; padding: 0.4rem 0.75rem; text-align: left; }
    th { background: #f5f5f5; }
    .muted { color: #666; font-size: 0.9rem; }
    /* Shared: terminal chip minute pills (search + /airport tabs). Queue labels stay unstyled. */
    .wait-time-pill {
      display: inline-block;
      border-radius: 5px;
      padding: 0.07em 0.38em 0.09em;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      line-height: 1.15;
    }
    .wait-time-pill--low {
      background: #dcfce7;
      color: #166534;
    }
    .wait-time-pill--mid {
      background: #fef9c3;
      color: #854d0e;
    }
    .wait-time-pill--high {
      background: #fee2e2;
      color: #b91c1c;
    }
    .terminal-link { font-weight: 500; }
    .back { margin-bottom: 1rem; }
    .airport-section { margin-bottom: 2rem; }
    .airport-section h2 { margin-bottom: 0.5rem; }
    .chart-container { position: relative; height: 280px; margin: 1rem 0; }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
      padding: 1rem 0;
    }
    .social-links a {
      display: inline-flex;
      color: #000;
    }
    .social-links a:hover { color: #0066cc; }
    .social-links svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
  </style>
  {% block head %}{% endblock %}

</head>
<body>
  {% block body %}{% endblock %}
  <footer class="social-links" aria-label="Social links">
    <a href="https://x.com/tsatimez/" target="_blank" rel="noopener noreferrer" aria-label="Follow TSA Times on X" title="Follow TSA Times on X">

</html>
