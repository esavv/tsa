{% extends "base.html" %}
{% block title %}TSA Times - Major US Airports{% endblock %}
{% block head %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    main.airport-layout {
      width: 100%;
    }
    .airport-cluster {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }
    .airport-layout,
    .chart-shell,
    .chart-container {
      width: 100%;
      max-width: 100%;
    }
    .airport-cluster > h1 {
      margin-bottom: 0.5rem;
      line-height: 1.15;
    }
    .airport-subhead {
      margin-top: 0;
      margin-bottom: 0.75rem;
    }
    .airport-search-wrap {
      margin: 0.75rem 0 0.35rem;
    }
    .airport-search-field {
      position: relative;
      max-width: min(28rem, 100%);
    }
    .airport-search {
      width: 100%;
      max-width: 100%;
      padding: 0.45rem 0.65rem;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9fafb;
      color: #0f172a;
    }
    .airport-search::placeholder {
      color: #64748b;
    }
    .airport-search-panel {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      z-index: 40;
      background: #fff;
      border: 1px solid #d0d7e2;
      border-radius: 10px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      max-height: min(340px, 55vh);
      overflow-y: auto;
    }
    .airport-below-search {
      position: relative;
    }
    .airport-below-search > .airport-search-panel.airport-search-panel--chart-overlay {
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      max-height: none;
      margin: 0;
      border-radius: 10px;
      z-index: 50;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
    }
    .airport-search-results {
      padding: 0.25rem 0;
    }
    .airport-search-row {
      padding: 0.55rem 0.75rem 0.6rem;
      cursor: pointer;
      border-bottom: 1px solid #eef2f7;
    }
    .airport-search-row:last-child {
      border-bottom: none;
    }
    .airport-search-row:hover,
    .airport-search-row.is-active {
      background: #f1f5f9;
    }
    .airport-search-row--current {
      outline: 1px solid #cbd5e1;
      outline-offset: -1px;
    }
    .airport-search-row__top {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .airport-search-code {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      color: #0f172a;
      flex-shrink: 0;
    }
    .airport-search-name {
      font-size: 0.9rem;
      color: #1e293b;
      line-height: 1.3;
    }
    .airport-search-row__meta {
      font-size: 0.78rem;
      margin-top: 0.2rem;
      line-height: 1.35;
    }
    .airport-search-row__waits {
      font-size: 0.78rem;
      margin-top: 0.25rem;
      color: #334155;
      font-weight: 500;
    }
    .airport-search-row__waits--empty {
      font-weight: 400;
    }
    .airport-subtitle {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.5rem 0 0.75rem;
    }
    .tab-btn {
      border: 1px solid #d0d7e2;
      border-radius: 12px;
      background: #fff;
      color: #334155;
      font-size: 0.8rem;
      padding: 0.4rem 0.65rem 0.45rem;
      cursor: pointer;
      text-align: left;
      line-height: 1.25;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.15rem;
      max-width: 17rem;
    }
    .tab-btn.active {
      background: #1f2937;
      color: #fff;
      border-color: #1f2937;
    }
    .tab-btn .tab-label-short {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 15.5rem;
      font-weight: 500;
    }
    .tab-btn .tab-waits {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem 0.45rem;
      font-size: 0.68rem;
      line-height: 1.35;
      font-weight: 400;
      color: #64748b;
      max-width: 15.5rem;
    }
    .tab-btn.active .tab-waits {
      color: rgba(226, 232, 240, 0.95);
    }
    .tab-btn .tab-wait-chip {
      white-space: nowrap;
    }
    .tab-btn .tab-wait-more {
      color: #94a3b8;
      font-size: 0.65rem;
      align-self: center;
    }
    .tab-btn.active .tab-wait-more {
      color: rgba(226, 232, 240, 0.75);
    }
    .range-group {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-bottom: 0.5rem;
    }
    .range-btn {
      border: 1px solid #d0d7e2;
      border-radius: 999px;
      background: #fff;
      color: #334155;
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
    }
    .range-btn.active {
      background: #1f2937;
      color: #fff;
      border-color: #1f2937;
    }
    .chart-shell {
      margin: 0.5rem 0 1rem;
    }
    .chart-reading-fixed {
      display: none;
      text-align: left;
      margin-bottom: 0.5rem;
      min-height: 2.8rem;
    }
    .chart-shell.touch-chart-ui .chart-reading-fixed {
      display: block;
    }
    .chart-reading-fixed .line1 {
      font-weight: 600;
      color: #0f172a;
      font-size: 0.95rem;
      margin-bottom: 0.15rem;
      white-space: nowrap;
    }
    .chart-reading-fixed .line2 {
      color: #334155;
      font-size: 0.85rem;
      line-height: 1.35;
      white-space: nowrap;
    }
    .chart-reading-fixed .line3 {
      color: #334155;
      font-size: 0.85rem;
      line-height: 1.35;
      margin-top: 0.12rem;
      white-space: nowrap;
    }
    .chart-container { position: relative; }
    .chart-callout {
      position: absolute;
      top: 8px;
      left: 0;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.88);
      color: #0f172a;
      border-radius: 10px;
      padding: 0.45rem 0.7rem;
      font-size: 0.8rem;
      line-height: 1.3;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      z-index: 10;
      border: 1px solid #dbe2ea;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .chart-callout.chart-callout--stacked {
      white-space: normal;
    }
    .chart-callout .line1,
    .chart-callout .line2,
    .chart-callout .line3 {
      white-space: nowrap;
    }
    .chart-shell.touch-chart-ui .chart-callout {
      display: none !important;
    }
    .chart-callout .line1 {
      font-weight: 600;
      margin-bottom: 0.1rem;
    }
    .chart-callout .line2 {
      color: #334155;
      font-size: 0.78rem;
    }
    .chart-callout .line3 {
      color: #334155;
      font-size: 0.78rem;
      margin-top: 0.1rem;
    }
    .chart-container {
      height: 390px;
    }
    @media (min-width: 1200px) {
      .chart-container {
        height: 460px;
      }
    }
  </style>
{% endblock %}
{% block body %}
  <main class="airport-layout">
    <div class="airport-cluster">
      <h1>TSA Wait Times</h1>
      <p class="muted airport-subhead">Security line wait times at major US airports</p>
      <div class="airport-search-wrap">
        <div class="airport-search-field">
          <input
            type="search"
            class="airport-search"
            id="airport-search"
            disabled
            placeholder="Loading airport list…"
            aria-label="Search airports"
            aria-expanded="false"
          />
        </div>
      </div>
      <div class="airport-below-search">
        <h2 class="airport-subtitle" id="airport-page-title">{{ airport }}</h2>
        <div id="tab-row" class="tab-row" role="tablist" aria-label="Terminals"></div>
        <p class="muted" id="last-scraped-at"></p>
        <div class="range-group" id="range-group">
          <button type="button" class="range-btn" data-hours="6">6H</button>
          <button type="button" class="range-btn" data-hours="12">12H</button>
          <button type="button" class="range-btn active" data-hours="24">24H</button>
          <button type="button" class="range-btn" data-hours="72">3D</button>
          <button type="button" class="range-btn" data-hours="168">7D</button>
        </div>
        <div id="chart-shell" class="chart-shell">
          <div id="chart-reading-fixed" class="chart-reading-fixed" aria-live="polite" aria-atomic="true"></div>
          <div class="chart-container">
            <div id="chart-callout" class="chart-callout"></div>
            <canvas id="chart"></canvas>
          </div>
        </div>
        <div id="chart-loading" class="muted">Loading…</div>
        <div
          id="airport-search-panel"
          class="airport-search-panel airport-search-panel--chart-overlay"
          hidden
        >
          <div id="airport-search-results" class="airport-search-results"></div>
        </div>
      </div>
    </div>
  </main>
  <script>
    const pageAirport = {{ airport | tojson }};
    const initialTerminal = {{ initial_terminal | tojson }};
    const initialGate = {{ initial_gate | tojson }};

    const airportDisplayNames = {
      JFK: 'JFK',
      LGA: 'LaGuardia (LGA)',
      EWR: 'Newark (EWR)',
      LAX: 'Los Angeles (LAX)',
      MIA: 'Miami (MIA)',
      SEA: 'Seattle-Tacoma (SEA)',
      DCA: 'Reagan National (DCA)',
      ATL: 'Hartsfield-Jackson Atlanta (ATL)',
      DFW: 'Dallas/Fort Worth (DFW)',
      DEN: 'Denver (DEN)',
      CLT: 'Charlotte Douglas (CLT)',
      LAS: 'Harry Reid Las Vegas (LAS)',
      MCO: 'Orlando (MCO)',
      PHX: 'Phoenix Sky Harbor (PHX)',
    };

    let selectedTerminal = '';
    let selectedGate = '';
    let terminalRows = [];

    function titleCaseWords(s) {
      return String(s)
        .split(/\s+/)
        .map(function (word) {
          if (!word) return word;
          return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        })
        .join(' ');
    }

    function effectiveGate(code, gate) {
      if (code === 'CLT') return '';
      return gate || '';
    }

    const QUEUE_TAB_ORDER = ['general', 'precheck', 'priority', 'clear'];

    function sortQueueTypesFromKeys(types) {
      const set = new Set(types);
      const out = [];
      for (const q of QUEUE_TAB_ORDER) {
        if (set.has(q)) out.push(q);
      }
      const rest = [...set].filter(function (q) {
        return QUEUE_TAB_ORDER.indexOf(q) === -1;
      }).sort();
      return out.concat(rest);
    }

    const CHART_LINE_COLORS = [
      '#2563eb', '#16a34a', '#ca8a04', '#9333ea', '#dc2626', '#0891b2', '#4f46e5',
      '#db2777', '#0d9488', '#7c3aed',
    ];

    function queueChartDatasetLabel(qt) {
      const labels = {
        general: 'General',
        precheck: 'TSA PreCheck',
        priority: 'Priority',
        clear: 'Clear',
      };
      if (labels[qt]) return labels[qt];
      return String(qt).replace(/_/g, ' ').replace(/\b\w/g, function (c) {
        return c.toUpperCase();
      });
    }

    /** Hover / fixed readout: same phrasing as the old two-line readout (PreCheck, not TSA PreCheck). */
    function queueReadoutLabel(qt) {
      const labels = {
        general: 'General',
        precheck: 'PreCheck',
        priority: 'Priority',
        clear: 'Clear',
      };
      if (labels[qt]) return labels[qt];
      return String(qt).replace(/_/g, ' ').replace(/\b\w/g, function (c) {
        return c.toUpperCase();
      });
    }

    const QUEUE_FILL_BY_TYPE = {
      general: 'rgba(37,99,235,0.1)',
      precheck: 'rgba(22,163,74,0.1)',
      priority: 'rgba(202,138,4,0.12)',
      clear: 'rgba(147,51,234,0.12)',
    };

    function queueFillColor(qt) {
      return QUEUE_FILL_BY_TYPE[qt] || 'rgba(51,65,85,0.08)';
    }

    function sortedQueueTypesWithMinutes(queues) {
      const q = queues || {};
      const keys = Object.keys(q).filter(function (qt) {
        const slot = q[qt];
        return slot && slot.minutes != null;
      });
      const out = [];
      for (const qt of QUEUE_TAB_ORDER) {
        if (keys.includes(qt)) out.push(qt);
      }
      const rest = keys.filter(function (qt) {
        return QUEUE_TAB_ORDER.indexOf(qt) === -1;
      }).sort();
      return out.concat(rest);
    }

    function queueTabAbbrev(qt) {
      const map = {
        general: 'Gen',
        precheck: 'Pre',
        priority: 'Pri',
        clear: 'Clear',
      };
      if (map[qt]) return map[qt];
      if (qt.length <= 5) return qt;
      return qt.slice(0, 4) + '…';
    }

    /** Short wait summary for a tab (latest scrape only). */
    function tabWaitsTitleFragment(row) {
      const types = sortedQueueTypesWithMinutes(row.queues);
      if (!types.length) return '';
      return types
        .map(function (qt) {
          return queueTabAbbrev(qt) + ' ' + row.queues[qt].minutes + 'm';
        })
        .join(', ');
    }

    function tabLabelForRow(code, terminal, gateRaw) {
      const t = terminal || '';
      const g = effectiveGate(code, gateRaw);
      if (code === 'CLT') {
        return t;
      }
      if (code === 'ATL') {
        if (!g) return t;
        return t + ': ' + titleCaseWords(g);
      }
      if (code === 'MIA') {
        if (!g) return 'Checkpoint ' + t;
        return 'Checkpoint ' + t + ': Gates ' + g;
      }
      if (!g) {
        return 'Terminal ' + t;
      }
      if (code === 'DFW') {
        return 'Terminal ' + t + ': Gate ' + g;
      }
      if (code === 'LAS' || code === 'PHX') {
        return 'Terminal ' + t + ': ' + g;
      }
      if (code === 'EWR' || code === 'MCO') {
        return 'Terminal ' + t + ': Gates ' + g;
      }
      return 'Terminal ' + t + ': Gates ' + g;
    }

    function syncUrl() {
      const u = new URL(window.location.origin + '/' + pageAirport);
      if (selectedTerminal) u.searchParams.set('terminal', selectedTerminal);
      const eg = effectiveGate(pageAirport, selectedGate);
      if (eg) u.searchParams.set('gate', eg);
      history.replaceState({}, '', u.pathname + u.search);
    }

    function rowMatchesInitial(row) {
      if (row.terminal !== initialTerminal) return false;
      if (pageAirport === 'CLT') return true;
      return String(row.gate || '') === String(initialGate || '');
    }

    const chartCanvas = document.getElementById('chart');
    const chartShell = document.getElementById('chart-shell');
    const readingFixedEl = document.getElementById('chart-reading-fixed');
    let chart = null;
    let chartTouchAbort = null;
    let currentHours = 24;
    let lastHistoryPayload = null;
    let lastHistoryRequestHours = null;
    const loadingEl = document.getElementById('chart-loading');
    const calloutEl = document.getElementById('chart-callout');
    const lastScrapedEl = document.getElementById('last-scraped-at');
    const tabRowEl = document.getElementById('tab-row');
    const airportTitleEl = document.getElementById('airport-page-title');
    airportTitleEl.textContent = airportDisplayNames[pageAirport] || pageAirport;

    const mqTouch = window.matchMedia('(hover: none) and (pointer: coarse)');
    function touchChartUi() {
      return mqTouch.matches;
    }
    function syncTouchChartShell() {
      chartShell.classList.toggle('touch-chart-ui', touchChartUi());
    }
    syncTouchChartShell();
    mqTouch.addEventListener('change', () => {
      syncTouchChartShell();
      if (lastHistoryPayload != null && lastHistoryRequestHours != null) {
        buildChartFromHistory(lastHistoryPayload, lastHistoryRequestHours);
      }
    });

    const readoutCrosshairPlugin = {
      id: 'readoutCrosshair',
      afterDatasetsDraw(chartRef) {
        const idx = chartRef.$readoutIndex;
        if (idx == null || idx < 0) return;
        let x = null;
        const { ctx, chartArea } = chartRef;
        const n = chartRef.data.datasets.length;
        for (let di = 0; di < n; di++) {
          const meta = chartRef.getDatasetMeta(di);
          const pt = meta.data[idx];
          if (pt && !pt.skip) {
            x = pt.x;
            break;
          }
        }
        if (x == null) return;
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([3, 4]);
        ctx.strokeStyle = 'rgba(15, 23, 42, 0.28)';
        ctx.lineWidth = 1;
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        function dot(px, py, fill) {
          ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.arc(px, py, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        for (let di = 0; di < n; di++) {
          const meta = chartRef.getDatasetMeta(di);
          const pt = meta.data[idx];
          if (!pt || pt.skip) continue;
          const fill = chartRef.data.datasets[di].borderColor || '#334155';
          dot(pt.x, pt.y, fill);
        }
        ctx.restore();
      }
    };
    Chart.register(readoutCrosshairPlugin);

    function hideCallout() {
      calloutEl.style.display = 'none';
      calloutEl.className = 'chart-callout';
    }

    function formatReadoutLine(qts, byQt) {
      return qts
        .map(function (qt) {
          const v = byQt[qt];
          return queueReadoutLabel(qt) + ': ' + (v != null ? v + ' min' : '–');
        })
        .join(' · ');
    }

    function readoutHtml(label, byQt, order) {
      const ord = order || [];
      let body = '';
      if (ord.length <= 2) {
        body = '<div class="line2">' + formatReadoutLine(ord, byQt) + '</div>';
      } else {
        body =
          '<div class="line2">' + formatReadoutLine(ord.slice(0, 2), byQt) + '</div>' +
          '<div class="line3">' + formatReadoutLine(ord.slice(2), byQt) + '</div>';
      }
      return '<div class="line1">' + label + '</div>' + body;
    }

    function readoutValuesAtIndex(chartRef, idx) {
      const byQt = {};
      for (let di = 0; di < chartRef.data.datasets.length; di++) {
        const ds = chartRef.data.datasets[di];
        const k = ds.queueTypeKey;
        if (k) byQt[k] = ds.data[idx];
      }
      return byQt;
    }

    function showCallout(x, label, chartRef, idx) {
      const order = chartRef.$queueTypeOrder || [];
      const stacked = order.length > 2;
      calloutEl.className = 'chart-callout' + (stacked ? ' chart-callout--stacked' : '');
      calloutEl.innerHTML = readoutHtml(label, readoutValuesAtIndex(chartRef, idx), order);
      calloutEl.style.left = x + 'px';
      calloutEl.style.display = 'block';
    }

    function setFixedReadout(label, chartRef, idx) {
      const order = chartRef.$queueTypeOrder || [];
      const stacked = order.length > 2;
      readingFixedEl.className = 'chart-reading-fixed' + (stacked ? ' chart-reading-fixed--stacked' : '');
      readingFixedEl.innerHTML = readoutHtml(label, readoutValuesAtIndex(chartRef, idx), order);
    }

    function clearFixedReadout() {
      readingFixedEl.innerHTML = '';
      readingFixedEl.className = 'chart-reading-fixed';
    }

    function xToClosestIndex(chartRef, pixelX) {
      const n = chartRef.data.labels.length;
      if (!n) return null;
      let best = 0;
      let bestDist = Infinity;
      for (let i = 0; i < n; i++) {
        const x = chartRef.scales.x.getPixelForTick(i);
        const d = Math.abs(pixelX - x);
        if (d < bestDist) {
          bestDist = d;
          best = i;
        }
      }
      return best;
    }

    function applyReadoutAtIndex(chartRef, idx) {
      if (idx == null || idx < 0) return;
      const label = chartRef.data.labels[idx];
      chartRef.$readoutIndex = idx;
      if (touchChartUi()) {
        hideCallout();
        setFixedReadout(label, chartRef, idx);
        chartRef.update('none');
      } else {
        let x = chartRef.scales.x.getPixelForTick(idx);
        for (let di = 0; di < chartRef.data.datasets.length; di++) {
          const el = chartRef.getDatasetMeta(di).data[idx];
          if (el && !el.skip) {
            x = el.x;
            break;
          }
        }
        showCallout(x, label, chartRef, idx);
        chartRef.update('none');
      }
    }

    function detachChartTouchHandlers() {
      if (chartTouchAbort) {
        chartTouchAbort.abort();
        chartTouchAbort = null;
      }
    }

    function attachChartTouchScrub(chartRef) {
      detachChartTouchHandlers();
      if (!touchChartUi()) return;
      const canvas = chartRef.canvas;
      const ac = new AbortController();
      chartTouchAbort = ac;
      const onTouch = (e) => {
        if (!e.touches || !e.touches.length) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const idx = xToClosestIndex(chartRef, x);
        if (idx != null) applyReadoutAtIndex(chartRef, idx);
      };
      canvas.addEventListener('touchstart', onTouch, { passive: false, signal: ac.signal });
      canvas.addEventListener('touchmove', onTouch, { passive: false, signal: ac.signal });
    }

    function updateRangeButtons(hours) {
      document.querySelectorAll('.range-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.hours === String(hours));
      });
    }

    function shouldShowTick(dateObj, hours) {
      const minute = dateObj.getMinutes();
      const hour = dateObj.getHours();
      if (touchChartUi()) {
        if (hours === 6) return minute === 0;
        if (hours === 12) return minute === 0 && hour % 2 === 0;
        if (hours === 24) return minute === 0 && hour % 3 === 0;
        if (hours === 72) return minute === 0 && (hour === 0 || hour === 12);
        if (hours === 168) return minute === 0 && hour === 0;
        return false;
      }
      if (hours === 6) return minute === 0 || minute === 30;
      if (hours === 12 || hours === 24) return minute === 0;
      if (hours === 72) return minute === 0 && (hour % 6 === 0);
      if (hours === 168) return minute === 0 && (hour % 12 === 0);
      return false;
    }

    function formatTick(dateObj, hours) {
      const datePart = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' });
      if (hours === 72 || hours === 168) {
        const timeShort = dateObj.toLocaleTimeString([], { hour: 'numeric', hour12: true });
        return datePart + ' ' + timeShort;
      }
      const timePart = dateObj.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      if (hours === 6 || hours === 12 || hours === 24) {
        if (dateObj.getHours() === 0 && dateObj.getMinutes() === 0) {
          return datePart + ' ' + timePart;
        }
        return timePart;
      }
      return datePart + ' ' + timePart;
    }

    function buildChartFromHistory(data, hours) {
      currentHours = Number(hours);
      hideCallout();
      clearFixedReadout();
      if (chart) {
        detachChartTouchHandlers();
        chart.destroy();
        chart = null;
      }

      const labels = [];
      const rawTimes = [];
      const queues = data.queues || {};
      const queueTypes = sortQueueTypesFromKeys(
        Object.keys(queues).filter(function (qt) {
          return (queues[qt] || []).length > 0;
        })
      );

      const byTime = {};
      for (let qi = 0; qi < queueTypes.length; qi++) {
        const qt = queueTypes[qi];
        for (const p of queues[qt] || []) {
          if (!byTime[p.t]) byTime[p.t] = { t: p.t };
          byTime[p.t][qt] = p.minutes;
        }
      }

      const sorted = Object.values(byTime).sort(function (a, b) {
        return a.t.localeCompare(b.t);
      });
      for (let si = 0; si < sorted.length; si++) {
        const row = sorted[si];
        labels.push(
          new Date(row.t).toLocaleString([], {
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
          })
        );
        rawTimes.push(row.t);
      }

      const useAreaFill = queueTypes.length <= 2;
      const datasets = queueTypes.map(function (qt, i) {
        return {
          label: queueChartDatasetLabel(qt),
          queueTypeKey: qt,
          data: sorted.map(function (row) {
            return row[qt] != null ? row[qt] : null;
          }),
          borderColor: CHART_LINE_COLORS[i % CHART_LINE_COLORS.length],
          borderWidth: 2,
          backgroundColor: useAreaFill ? queueFillColor(qt) : 'transparent',
          pointRadius: 0,
          pointHoverRadius: 5,
          fill: useAreaFill,
          tension: 0.2,
        };
      });

      if (!datasets.length) {
        hideCallout();
        clearFixedReadout();
        return;
      }

      const ctx = chartCanvas.getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets,
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              align: 'end',
              labels: {
                usePointStyle: true,
                pointStyle: 'line',
                boxWidth: 36,
                boxHeight: 8,
                font: { size: 10 },
              },
            },
            tooltip: { enabled: false }
          },
          onHover: (event, _elements, chartRef) => {
            if (touchChartUi()) return;
            const points = chartRef.getElementsAtEventForMode(event, 'index', { intersect: false }, false);
            if (!points.length) {
              chartRef.$readoutIndex = null;
              hideCallout();
              chartRef.update('none');
              return;
            }
            const idx = points[0].index;
            const label = chartRef.data.labels[idx];
            const x = points[0].element.x;
            chartRef.$readoutIndex = idx;
            showCallout(x, label, chartRef, idx);
            chartRef.update('none');
          },
          scales: {
            y: {
              beginAtZero: true,
              title: { display: !touchChartUi(), text: 'Minutes' }
            },
            x: {
              grid: { display: false, drawBorder: false },
              ticks: {
                autoSkip: false,
                minRotation: 45,
                maxRotation: 45,
                callback: function(_value, index) {
                  const iso = rawTimes[index];
                  if (!iso) return '';
                  const dt = new Date(iso);
                  if (!shouldShowTick(dt, currentHours)) return '';
                  return formatTick(dt, currentHours);
                }
              }
            }
          }
        }
      });
      chart.$queueTypeOrder = queueTypes;

      if (labels.length) {
        const last = labels.length - 1;
        if (touchChartUi()) {
          chart.$readoutIndex = last;
          setFixedReadout(labels[last], chart, last);
          chart.update('none');
          attachChartTouchScrub(chart);
        } else {
          chart.$readoutIndex = null;
          hideCallout();
          chart.update('none');
        }
      } else {
        hideCallout();
        clearFixedReadout();
      }
    }

    function renderChart(hours) {
      currentHours = Number(hours);
      loadingEl.style.display = 'block';
      loadingEl.textContent = 'Loading history...';
      hideCallout();
      clearFixedReadout();
      updateRangeButtons(hours);

      let url = '/api/history?airport=' + encodeURIComponent(pageAirport)
        + '&terminal=' + encodeURIComponent(selectedTerminal)
        + '&hours=' + encodeURIComponent(hours);
      if (selectedGate) url += '&gate=' + encodeURIComponent(selectedGate);

      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (data.error) throw new Error(data.error);
          loadingEl.style.display = 'none';

          lastHistoryPayload = data;
          lastHistoryRequestHours = Number(hours);
          buildChartFromHistory(data, hours);
        })
        .catch(e => {
          loadingEl.style.display = 'block';
          loadingEl.textContent = 'Error: ' + e.message;
          lastHistoryPayload = null;
          lastHistoryRequestHours = null;
          hideCallout();
          clearFixedReadout();
          detachChartTouchHandlers();
          if (chart) {
            chart.destroy();
            chart = null;
          }
        });
    }

    function selectTabByIndex(i) {
      if (i < 0 || i >= terminalRows.length) return;
      const row = terminalRows[i];
      selectedTerminal = row.terminal;
      selectedGate = row.gate || '';
      tabRowEl.querySelectorAll('.tab-btn').forEach((btn, j) => {
        btn.classList.toggle('active', j === i);
        btn.setAttribute('aria-selected', j === i ? 'true' : 'false');
      });
      syncUrl();
      renderChart(currentHours);
    }

    function buildTabs(rows, activeIndex) {
      tabRowEl.innerHTML = '';
      const maxChips = 6;
      rows.forEach((row, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tab-btn' + (i === activeIndex ? ' active' : '');
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', i === activeIndex ? 'true' : 'false');
        btn.dataset.index = String(i);
        const label = tabLabelForRow(pageAirport, row.terminal, row.gate);
        const waitFrag = tabWaitsTitleFragment(row);
        btn.title = waitFrag ? label + ' — ' + waitFrag : label;
        const span = document.createElement('span');
        span.className = 'tab-label-short';
        span.textContent = label;
        btn.appendChild(span);
        const types = sortedQueueTypesWithMinutes(row.queues);
        const wrap = document.createElement('div');
        wrap.className = 'tab-waits';
        wrap.setAttribute('aria-hidden', 'true');
        if (!types.length) {
          wrap.textContent = '—';
        } else {
          types.slice(0, maxChips).forEach(function (qt) {
            const chip = document.createElement('span');
            chip.className = 'tab-wait-chip';
            chip.textContent = queueTabAbbrev(qt) + ' ' + row.queues[qt].minutes + 'm';
            wrap.appendChild(chip);
          });
          if (types.length > maxChips) {
            const more = document.createElement('span');
            more.className = 'tab-wait-more';
            more.textContent = '+' + (types.length - maxChips);
            wrap.appendChild(more);
          }
        }
        btn.appendChild(wrap);
        btn.addEventListener('click', () => selectTabByIndex(Number(btn.dataset.index)));
        tabRowEl.appendChild(btn);
      });
    }

    chartCanvas.addEventListener('mouseleave', () => {
      hideCallout();
      if (chart) {
        chart.$readoutIndex = null;
        chart.update('none');
      }
    });

    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => renderChart(btn.dataset.hours));
    });

    fetch('/api/latest')
      .then(r => r.json())
      .then(data => {
        const rows = (data.airports || {})[pageAirport];
        if (data.scraped_at_utc) {
          const d = new Date(data.scraped_at_utc);
          lastScrapedEl.textContent =
            'Last updated: ' +
            d.toLocaleString([], {
              year: 'numeric',
              month: 'numeric',
              day: 'numeric',
              hour: 'numeric',
              minute: '2-digit',
            });
        } else {
          lastScrapedEl.textContent = 'Last updated: —';
        }
        if (!rows || !rows.length) {
          loadingEl.textContent = 'No wait time data for this airport yet.';
          chartShell.style.display = 'none';
          return;
        }
        terminalRows = rows;
        let pick = 0;
        if (initialTerminal) {
          const found = rows.findIndex(rowMatchesInitial);
          if (found >= 0) pick = found;
        }
        buildTabs(rows, pick);
        selectedTerminal = rows[pick].terminal;
        selectedGate = rows[pick].gate || '';
        syncUrl();
        renderChart(24);
      })
      .catch(e => {
        loadingEl.textContent = 'Error: ' + e.message;
        chartShell.style.display = 'none';
      });
  </script>
  <script src="{{ url_for('static', filename='airport_search.js') }}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof initTsaAirportSearch !== 'function') return;
      var inp = document.getElementById('airport-search');
      var panel = document.getElementById('airport-search-panel');
      var list = document.getElementById('airport-search-results');
      if (!inp || !panel || !list) return;
      initTsaAirportSearch({
        input: inp,
        panel: panel,
        list: list,
        currentAirportCode: pageAirport,
      });
    });
  </script>
{% endblock %}
