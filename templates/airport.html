{% extends "base.html" %}
{% block title %}TSA Times - Major US Airports{% endblock %}
{% block head %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    main.airport-layout {
      width: 100%;
    }
    .airport-cluster {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }
    .airport-layout,
    .chart-shell,
    .chart-container {
      width: 100%;
      max-width: 100%;
    }
    .airport-cluster > h1 {
      margin-bottom: 0.5rem;
      line-height: 1.15;
    }
    .airport-subhead {
      margin-top: 0;
      margin-bottom: 0.75rem;
    }
    .airport-search-wrap {
      margin: 0.75rem 0 1rem;
    }
    .airport-search {
      width: 100%;
      max-width: 22rem;
      padding: 0.45rem 0.65rem;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9fafb;
      color: #64748b;
    }
    .airport-subtitle {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.5rem 0 0.75rem;
    }
    .tab-btn {
      border: 1px solid #d0d7e2;
      border-radius: 999px;
      background: #fff;
      color: #334155;
      font-size: 0.8rem;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      max-width: 100%;
      text-align: left;
      line-height: 1.25;
    }
    .tab-btn.active {
      background: #1f2937;
      color: #fff;
      border-color: #1f2937;
    }
    .tab-btn .tab-label-short {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 16rem;
    }
    .range-group {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-bottom: 0.5rem;
    }
    .range-btn {
      border: 1px solid #d0d7e2;
      border-radius: 999px;
      background: #fff;
      color: #334155;
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
    }
    .range-btn.active {
      background: #1f2937;
      color: #fff;
      border-color: #1f2937;
    }
    .chart-shell { margin: 0.5rem 0 1rem; }
    .chart-reading-fixed {
      display: none;
      text-align: left;
      margin-bottom: 0.5rem;
      min-height: 2.8rem;
    }
    .chart-shell.touch-chart-ui .chart-reading-fixed {
      display: block;
    }
    .chart-reading-fixed .line1 {
      font-weight: 600;
      color: #0f172a;
      font-size: 0.95rem;
      margin-bottom: 0.15rem;
    }
    .chart-reading-fixed .line2 {
      color: #334155;
      font-size: 0.85rem;
      line-height: 1.35;
    }
    .chart-container { position: relative; }
    .chart-callout {
      position: absolute;
      top: 8px;
      left: 0;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.88);
      color: #0f172a;
      border-radius: 10px;
      padding: 0.45rem 0.7rem;
      font-size: 0.8rem;
      line-height: 1.3;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      z-index: 10;
      border: 1px solid #dbe2ea;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .chart-shell.touch-chart-ui .chart-callout {
      display: none !important;
    }
    .chart-callout .line1 {
      font-weight: 600;
      margin-bottom: 0.1rem;
    }
    .chart-callout .line2 {
      color: #334155;
      font-size: 0.78rem;
    }
    .chart-container {
      height: 390px;
    }
    @media (min-width: 1200px) {
      .chart-container {
        height: 460px;
      }
    }
  </style>
{% endblock %}
{% block body %}
  <main class="airport-layout">
    <div class="airport-cluster">
      <h1>TSA Wait Times</h1>
      <p class="muted airport-subhead">Security line wait times at major US airports</p>
      <div class="airport-search-wrap">
        <input
          type="search"
          class="airport-search"
          id="airport-search"
          disabled
          placeholder="Change airport (coming soon)"
          aria-label="Change airport"
        />
      </div>
      <h2 class="airport-subtitle" id="airport-page-title">{{ airport }}</h2>
      <div id="tab-row" class="tab-row" role="tablist" aria-label="Terminals"></div>
      <p class="muted" id="last-scraped-at"></p>
      <div class="range-group" id="range-group">
        <button type="button" class="range-btn" data-hours="6">6H</button>
        <button type="button" class="range-btn" data-hours="12">12H</button>
        <button type="button" class="range-btn active" data-hours="24">24H</button>
        <button type="button" class="range-btn" data-hours="72">3D</button>
        <button type="button" class="range-btn" data-hours="168">7D</button>
      </div>
      <div id="chart-shell" class="chart-shell">
        <div id="chart-reading-fixed" class="chart-reading-fixed" aria-live="polite" aria-atomic="true"></div>
        <div class="chart-container">
          <div id="chart-callout" class="chart-callout"></div>
          <canvas id="chart"></canvas>
        </div>
      </div>
      <div id="chart-loading" class="muted">Loading…</div>
    </div>
  </main>
  <script>
    const pageAirport = {{ airport | tojson }};
    const initialTerminal = {{ initial_terminal | tojson }};
    const initialGate = {{ initial_gate | tojson }};

    const airportDisplayNames = {
      JFK: 'JFK',
      LGA: 'LaGuardia (LGA)',
      EWR: 'Newark (EWR)',
      LAX: 'Los Angeles (LAX)',
      MIA: 'Miami (MIA)',
      SEA: 'Seattle-Tacoma (SEA)',
      DCA: 'Reagan National (DCA)',
      ATL: 'Hartsfield-Jackson Atlanta (ATL)',
      DFW: 'Dallas/Fort Worth (DFW)',
      DEN: 'Denver (DEN)',
      CLT: 'Charlotte Douglas (CLT)',
      LAS: 'Harry Reid Las Vegas (LAS)',
      MCO: 'Orlando (MCO)',
      PHX: 'Phoenix Sky Harbor (PHX)',
    };

    let selectedTerminal = '';
    let selectedGate = '';
    let terminalRows = [];

    function titleCaseWords(s) {
      return String(s)
        .split(/\s+/)
        .map(function (word) {
          if (!word) return word;
          return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        })
        .join(' ');
    }

    function effectiveGate(code, gate) {
      if (code === 'CLT') return '';
      return gate || '';
    }

    function tabLabelForRow(code, terminal, gateRaw) {
      const t = terminal || '';
      const g = effectiveGate(code, gateRaw);
      if (code === 'CLT') {
        return t;
      }
      if (code === 'ATL') {
        if (!g) return t;
        return t + ': ' + titleCaseWords(g);
      }
      if (code === 'MIA') {
        if (!g) return 'Checkpoint ' + t;
        return 'Checkpoint ' + t + ': Gates ' + g;
      }
      if (!g) {
        return 'Terminal ' + t;
      }
      if (code === 'DFW') {
        return 'Terminal ' + t + ': Gate ' + g;
      }
      if (code === 'LAS' || code === 'PHX') {
        return 'Terminal ' + t + ': ' + g;
      }
      if (code === 'EWR' || code === 'MCO') {
        return 'Terminal ' + t + ': Gates ' + g;
      }
      return 'Terminal ' + t + ': Gates ' + g;
    }

    function syncUrl() {
      const u = new URL(window.location.origin + '/' + pageAirport);
      if (selectedTerminal) u.searchParams.set('terminal', selectedTerminal);
      const eg = effectiveGate(pageAirport, selectedGate);
      if (eg) u.searchParams.set('gate', eg);
      history.replaceState({}, '', u.pathname + u.search);
    }

    function rowMatchesInitial(row) {
      if (row.terminal !== initialTerminal) return false;
      if (pageAirport === 'CLT') return true;
      return String(row.gate || '') === String(initialGate || '');
    }

    const chartCanvas = document.getElementById('chart');
    const chartShell = document.getElementById('chart-shell');
    const readingFixedEl = document.getElementById('chart-reading-fixed');
    let chart = null;
    let chartTouchAbort = null;
    let currentHours = 24;
    let lastHistoryPayload = null;
    let lastHistoryRequestHours = null;
    const loadingEl = document.getElementById('chart-loading');
    const calloutEl = document.getElementById('chart-callout');
    const lastScrapedEl = document.getElementById('last-scraped-at');
    const tabRowEl = document.getElementById('tab-row');
    const airportTitleEl = document.getElementById('airport-page-title');
    airportTitleEl.textContent = airportDisplayNames[pageAirport] || pageAirport;

    const mqTouch = window.matchMedia('(hover: none) and (pointer: coarse)');
    function touchChartUi() {
      return mqTouch.matches;
    }
    function syncTouchChartShell() {
      chartShell.classList.toggle('touch-chart-ui', touchChartUi());
    }
    syncTouchChartShell();
    mqTouch.addEventListener('change', () => {
      syncTouchChartShell();
      if (lastHistoryPayload != null && lastHistoryRequestHours != null) {
        buildChartFromHistory(lastHistoryPayload, lastHistoryRequestHours);
      }
    });

    const readoutCrosshairPlugin = {
      id: 'readoutCrosshair',
      afterDatasetsDraw(chartRef) {
        const idx = chartRef.$readoutIndex;
        if (idx == null || idx < 0) return;
        const meta0 = chartRef.getDatasetMeta(0);
        const meta1 = chartRef.getDatasetMeta(1);
        const p0 = meta0.data[idx];
        const p1 = meta1.data[idx];
        const ok0 = p0 && !p0.skip;
        const ok1 = p1 && !p1.skip;
        const x = ok0 ? p0.x : (ok1 ? p1.x : null);
        if (x == null) return;
        const { ctx, chartArea } = chartRef;
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([3, 4]);
        ctx.strokeStyle = 'rgba(15, 23, 42, 0.28)';
        ctx.lineWidth = 1;
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        function dot(px, py, fill) {
          ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.arc(px, py, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        if (ok0) dot(p0.x, p0.y, '#2563eb');
        if (ok1) dot(p1.x, p1.y, '#16a34a');
        ctx.restore();
      }
    };
    Chart.register(readoutCrosshairPlugin);

    function hideCallout() {
      calloutEl.style.display = 'none';
    }

    function readoutHtml(label, general, precheck) {
      const gText = (general != null ? general + ' min' : '-');
      const pText = (precheck != null ? precheck + ' min' : '-');
      return (
        '<div class="line1">' + label + '</div>' +
        '<div class="line2">General: ' + gText + ' · PreCheck: ' + pText + '</div>'
      );
    }

    function showCallout(x, label, general, precheck) {
      calloutEl.innerHTML = readoutHtml(label, general, precheck);
      calloutEl.style.left = x + 'px';
      calloutEl.style.display = 'block';
    }

    function setFixedReadout(label, general, precheck) {
      readingFixedEl.innerHTML = readoutHtml(label, general, precheck);
    }

    function clearFixedReadout() {
      readingFixedEl.innerHTML = '';
    }

    function xToClosestIndex(chartRef, pixelX) {
      const meta = chartRef.getDatasetMeta(0);
      const pts = meta.data;
      if (!pts.length) return null;
      let best = 0;
      let bestDist = Infinity;
      for (let i = 0; i < pts.length; i++) {
        const pt = pts[i];
        if (!pt || pt.skip) continue;
        const d = Math.abs(pixelX - pt.x);
        if (d < bestDist) {
          bestDist = d;
          best = i;
        }
      }
      return best;
    }

    function applyReadoutAtIndex(chartRef, idx) {
      if (idx == null || idx < 0) return;
      const label = chartRef.data.labels[idx];
      const g = chartRef.data.datasets[0].data[idx];
      const p = chartRef.data.datasets[1].data[idx];
      chartRef.$readoutIndex = idx;
      if (touchChartUi()) {
        hideCallout();
        setFixedReadout(label, g, p);
        chartRef.update('none');
      } else {
        const meta0 = chartRef.getDatasetMeta(0);
        const el = meta0.data[idx];
        const x = el ? el.x : chartRef.scales.x.getPixelForTick(idx);
        showCallout(x, label, g, p);
        chartRef.update('none');
      }
    }

    function detachChartTouchHandlers() {
      if (chartTouchAbort) {
        chartTouchAbort.abort();
        chartTouchAbort = null;
      }
    }

    function attachChartTouchScrub(chartRef) {
      detachChartTouchHandlers();
      if (!touchChartUi()) return;
      const canvas = chartRef.canvas;
      const ac = new AbortController();
      chartTouchAbort = ac;
      const onTouch = (e) => {
        if (!e.touches || !e.touches.length) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const idx = xToClosestIndex(chartRef, x);
        if (idx != null) applyReadoutAtIndex(chartRef, idx);
      };
      canvas.addEventListener('touchstart', onTouch, { passive: false, signal: ac.signal });
      canvas.addEventListener('touchmove', onTouch, { passive: false, signal: ac.signal });
    }

    function updateRangeButtons(hours) {
      document.querySelectorAll('.range-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.hours === String(hours));
      });
    }

    function shouldShowTick(dateObj, hours) {
      const minute = dateObj.getMinutes();
      const hour = dateObj.getHours();
      if (touchChartUi()) {
        if (hours === 6) return minute === 0;
        if (hours === 12) return minute === 0 && hour % 2 === 0;
        if (hours === 24) return minute === 0 && hour % 3 === 0;
        if (hours === 72) return minute === 0 && (hour === 0 || hour === 12);
        if (hours === 168) return minute === 0 && hour === 0;
        return false;
      }
      if (hours === 6) return minute === 0 || minute === 30;
      if (hours === 12 || hours === 24) return minute === 0;
      if (hours === 72) return minute === 0 && (hour % 6 === 0);
      if (hours === 168) return minute === 0 && (hour % 12 === 0);
      return false;
    }

    function formatTick(dateObj, hours) {
      const datePart = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' });
      if (hours === 72 || hours === 168) {
        const timeShort = dateObj.toLocaleTimeString([], { hour: 'numeric', hour12: true });
        return datePart + ' ' + timeShort;
      }
      const timePart = dateObj.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      if (hours === 6 || hours === 12 || hours === 24) {
        if (dateObj.getHours() === 0 && dateObj.getMinutes() === 0) {
          return datePart + ' ' + timePart;
        }
        return timePart;
      }
      return datePart + ' ' + timePart;
    }

    function buildChartFromHistory(data, hours) {
      currentHours = Number(hours);
      hideCallout();
      clearFixedReadout();
      if (chart) {
        detachChartTouchHandlers();
        chart.destroy();
        chart = null;
      }

      const labels = [];
      const rawTimes = [];
      const generalMinutes = [];
      const precheckMinutes = [];
      const byTime = {};

      for (const p of data.general || []) {
        byTime[p.t] = { t: p.t, general: p.minutes, precheck: null };
      }
      for (const p of data.precheck || []) {
        if (!byTime[p.t]) byTime[p.t] = { t: p.t, general: null, precheck: null };
        byTime[p.t].precheck = p.minutes;
      }

      const sorted = Object.values(byTime).sort((a, b) => a.t.localeCompare(b.t));
      for (const p of sorted) {
        labels.push(new Date(p.t).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }));
        rawTimes.push(p.t);
        generalMinutes.push(p.general != null ? p.general : null);
        precheckMinutes.push(p.precheck != null ? p.precheck : null);
      }

      const ctx = chartCanvas.getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'General',
              data: generalMinutes,
              borderColor: '#2563eb',
              borderWidth: 2,
              backgroundColor: 'rgba(37,99,235,0.1)',
              pointRadius: 0,
              pointHoverRadius: 5,
              fill: true,
              tension: 0.2
            },
            {
              label: 'TSA PreCheck',
              data: precheckMinutes,
              borderColor: '#16a34a',
              borderWidth: 2,
              backgroundColor: 'rgba(22,163,74,0.1)',
              pointRadius: 0,
              pointHoverRadius: 5,
              fill: true,
              tension: 0.2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              align: 'end',
              labels: {
                usePointStyle: true,
                pointStyle: 'line',
                boxWidth: 40,
                boxHeight: 8
              }
            },
            tooltip: { enabled: false }
          },
          onHover: (event, _elements, chartRef) => {
            if (touchChartUi()) return;
            const points = chartRef.getElementsAtEventForMode(event, 'index', { intersect: false }, false);
            if (!points.length) {
              chartRef.$readoutIndex = null;
              hideCallout();
              chartRef.update('none');
              return;
            }
            const idx = points[0].index;
            const label = chartRef.data.labels[idx];
            const g = chartRef.data.datasets[0].data[idx];
            const p = chartRef.data.datasets[1].data[idx];
            const x = points[0].element.x;
            chartRef.$readoutIndex = idx;
            showCallout(x, label, g, p);
            chartRef.update('none');
          },
          scales: {
            y: {
              beginAtZero: true,
              title: { display: !touchChartUi(), text: 'Minutes' }
            },
            x: {
              grid: { display: false, drawBorder: false },
              ticks: {
                autoSkip: false,
                minRotation: 45,
                maxRotation: 45,
                callback: function(_value, index) {
                  const iso = rawTimes[index];
                  if (!iso) return '';
                  const dt = new Date(iso);
                  if (!shouldShowTick(dt, currentHours)) return '';
                  return formatTick(dt, currentHours);
                }
              }
            }
          }
        }
      });

      if (labels.length) {
        const last = labels.length - 1;
        chart.$readoutIndex = last;
        if (touchChartUi()) {
          setFixedReadout(labels[last], generalMinutes[last], precheckMinutes[last]);
          chart.update('none');
          attachChartTouchScrub(chart);
        } else {
          const meta0 = chart.getDatasetMeta(0);
          const el = meta0.data[last];
          const x = el ? el.x : chart.scales.x.getPixelForTick(last);
          showCallout(x, labels[last], generalMinutes[last], precheckMinutes[last]);
          chart.update('none');
        }
      } else {
        hideCallout();
        clearFixedReadout();
      }
    }

    function renderChart(hours) {
      currentHours = Number(hours);
      loadingEl.style.display = 'block';
      loadingEl.textContent = 'Loading history...';
      hideCallout();
      clearFixedReadout();
      updateRangeButtons(hours);

      let url = '/api/history?airport=' + encodeURIComponent(pageAirport)
        + '&terminal=' + encodeURIComponent(selectedTerminal)
        + '&hours=' + encodeURIComponent(hours);
      if (selectedGate) url += '&gate=' + encodeURIComponent(selectedGate);

      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (data.error) throw new Error(data.error);
          loadingEl.style.display = 'none';

          lastHistoryPayload = data;
          lastHistoryRequestHours = Number(hours);
          buildChartFromHistory(data, hours);
        })
        .catch(e => {
          loadingEl.style.display = 'block';
          loadingEl.textContent = 'Error: ' + e.message;
          lastHistoryPayload = null;
          lastHistoryRequestHours = null;
          hideCallout();
          clearFixedReadout();
          detachChartTouchHandlers();
          if (chart) {
            chart.destroy();
            chart = null;
          }
        });
    }

    function selectTabByIndex(i) {
      if (i < 0 || i >= terminalRows.length) return;
      const row = terminalRows[i];
      selectedTerminal = row.terminal;
      selectedGate = row.gate || '';
      tabRowEl.querySelectorAll('.tab-btn').forEach((btn, j) => {
        btn.classList.toggle('active', j === i);
        btn.setAttribute('aria-selected', j === i ? 'true' : 'false');
      });
      syncUrl();
      renderChart(currentHours);
    }

    function buildTabs(rows, activeIndex) {
      tabRowEl.innerHTML = '';
      rows.forEach((row, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tab-btn' + (i === activeIndex ? ' active' : '');
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', i === activeIndex ? 'true' : 'false');
        btn.dataset.index = String(i);
        const label = tabLabelForRow(pageAirport, row.terminal, row.gate);
        btn.title = label;
        const span = document.createElement('span');
        span.className = 'tab-label-short';
        span.textContent = label;
        btn.appendChild(span);
        btn.addEventListener('click', () => selectTabByIndex(Number(btn.dataset.index)));
        tabRowEl.appendChild(btn);
      });
    }

    chartCanvas.addEventListener('mouseleave', () => {
      hideCallout();
      if (chart) {
        chart.$readoutIndex = null;
        chart.update('none');
      }
    });

    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => renderChart(btn.dataset.hours));
    });

    fetch('/api/latest')
      .then(r => r.json())
      .then(data => {
        const rows = (data.airports || {})[pageAirport];
        if (data.scraped_at_utc) {
          const d = new Date(data.scraped_at_utc);
          lastScrapedEl.textContent =
            'Last updated: ' +
            d.toLocaleString([], {
              year: 'numeric',
              month: 'numeric',
              day: 'numeric',
              hour: 'numeric',
              minute: '2-digit',
            });
        } else {
          lastScrapedEl.textContent = 'Last updated: —';
        }
        if (!rows || !rows.length) {
          loadingEl.textContent = 'No wait time data for this airport yet.';
          chartShell.style.display = 'none';
          return;
        }
        terminalRows = rows;
        let pick = 0;
        if (initialTerminal) {
          const found = rows.findIndex(rowMatchesInitial);
          if (found >= 0) pick = found;
        }
        buildTabs(rows, pick);
        selectedTerminal = rows[pick].terminal;
        selectedGate = rows[pick].gate || '';
        syncUrl();
        renderChart(24);
      })
      .catch(e => {
        loadingEl.textContent = 'Error: ' + e.message;
        chartShell.style.display = 'none';
      });
  </script>
{% endblock %}
